<script>
  const wrapper = document.getElementById("avatar-wrapper");
  const img = document.getElementById("avatar-img");
  const canvas = document.getElementById("avatar-canvas");
  const ctx = canvas.getContext("2d");
  const imageObj = new Image();
  imageObj.src = img.src;

  let particles = [];
  let animationId;
  let state = "idle"; // idle: 闲置, active: 散开, returning: 拼回

  imageObj.onload = () => {
    canvas.width = 120;
    canvas.height = 120;
    ctx.drawImage(imageObj, 0, 0, 120, 120);
    const data = ctx.getImageData(0, 0, 120, 120).data;

    for (let y = 0; y < 120; y += 4) {
      for (let x = 0; x < 120; x += 4) {
        const i = (y * 120 + x) * 4;
        if (data[i + 3] > 128) {
          particles.push({
            originX: x,
            originY: y,
            x: x,
            y: y,
            color: `rgba(${data[i]},${data[i + 1]},${data[i + 2]},${data[i + 3]})`,
            vx: Math.random() * 4 - 2,
            vy: Math.random() * 4 - 2,
          });
        }
      }
    }
  };

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let allBack = true;

    particles.forEach((p) => {
      if (state === "active") {
        // 散开逻辑
        p.x += p.vx;
        p.y += p.vy;
      } else if (state === "returning") {
        // 拼回逻辑：利用弹性公式吸回
        const dx = p.originX - p.x;
        const dy = p.originY - p.y;
        p.x += dx * 0.1;
        p.y += dy * 0.2;

        // 检查是否还没回到位（允许 0.1 像素误差）
        if (Math.abs(dx) > 0.1 || Math.abs(dy) > 0.1) allBack = false;
      }

      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, 3, 3);
    });

    // 如果是拼回状态且全部到位了，切回原图
    if (state === "returning" && allBack) {
      state = "idle";
      img.style.opacity = "1";
      canvas.style.opacity = "0";
      cancelAnimationFrame(animationId);
      return;
    }

    animationId = requestAnimationFrame(animate);
  }

  wrapper.addEventListener("mouseenter", () => {
    state = "active";
    img.style.opacity = "0";
    canvas.style.opacity = "1";
    // 每次进入先确保粒子在原点开始炸
    particles.forEach((p) => {
      p.x = p.originX;
      p.y = p.originY;
    });
    animate();
  });

  wrapper.addEventListener("mouseleave", () => {
    state = "returning";
  });

  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, "0");
    const m = String(now.getMinutes()).padStart(2, "0");
    const s = String(now.getSeconds()).padStart(2, "0");

    // 依次填入每一位数字
    document.getElementById("h1").innerText = h[0];
    document.getElementById("h2").innerText = h[1];
    document.getElementById("m1").innerText = m[0];
    document.getElementById("m2").innerText = m[1];
    document.getElementById("s1").innerText = s[0];
    document.getElementById("s2").innerText = s[1];
  }
  setInterval(updateClock, 1000);
  updateClock();

  function setGreeting() {
    var hour = new Date().getHours();
    var greeting = "";
    if (hour >= 6 && hour < 11) greeting = "早上好呀！";
    else if (hour >= 11 && hour < 14) greeting = "中午好！";
    else if (hour >= 14 && hour < 18) greeting = "下午好呀！";
    else if (hour >= 18 && hour < 24) greeting = "晚上好呀!";
    else greeting = "zzz...還不睡覺嗎？";

    document.getElementById("greeting").innerText = greeting;
  }
  setGreeting();

  // 全局变量
  let viewDate = new Date();
  let currentTodoDate = "";

  function renderCalendar() {
    const grid = document.getElementById("calendarGrid");
    const dateTitle = document.getElementById("calendarDateText");
    const weekdaySpans = document.querySelectorAll(".calendar-weekdays span");

    const now = new Date();
    const vYear = viewDate.getFullYear();
    const vMonth = viewDate.getMonth();
    const weekdays = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];

    // 1. 重置并设置星期标题高亮
    weekdaySpans.forEach((span) => span.classList.remove("weekday-active"));

    // 只有在“本月”才高亮对应的星期标题
    const isCurrentMonth =
      vYear === now.getFullYear() && vMonth === now.getMonth();
    if (isCurrentMonth) {
      const todayDay = now.getDay(); // 0(日) - 6(六)
      const targetIdx = todayDay === 0 ? 6 : todayDay - 1; // 对应 一(0) - 日(6)
      weekdaySpans[targetIdx].classList.add("weekday-active");
      dateTitle.innerText = `${vYear}/${vMonth + 1}/${now.getDate()} ${weekdays[todayDay]}`;
    } else {
      dateTitle.innerText = `${vYear}年 ${vMonth + 1}月`;
    }

    // 2. 计算月份偏移
    const firstDay = new Date(vYear, vMonth, 1).getDay();
    const daysInMonth = new Date(vYear, vMonth + 1, 0).getDate();
    const startOffset = firstDay === 0 ? 6 : firstDay - 1;

    grid.innerHTML = "";

    // 3. 填充空白
    for (let i = 0; i < startOffset; i++) {
      grid.innerHTML += `<div class="day-cell empty"></div>`;
    }

    // 4. 生成日期
    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement("div");
      cell.className = "day-cell";
      cell.innerText = d;

      const dateKey = `${vYear}-${vMonth + 1}-${d}`;
      const checkDate = new Date(vYear, vMonth, d);
      const todayZero = new Date().setHours(0, 0, 0, 0);

      // --- 状态判断 (过去/现在/未来) ---
      if (isCurrentMonth && d === now.getDate()) {
        cell.classList.add("day-today"); // 现在
      } else if (checkDate < todayZero) {
        cell.classList.add("day-past"); // 过去
      } else {
        cell.classList.add("day-future"); // 未来
      }

      // --- 星星逻辑 (有未完成的任务才显示黄色星星) ---
      const todos = JSON.parse(localStorage.getItem(`todo-${dateKey}`) || "[]");
      const hasPending = todos.some((t) => !t.done);
      if (hasPending) cell.classList.add("has-event");

      cell.onclick = () => openTodo(dateKey);
      grid.appendChild(cell);
    }
  }

  // --- 待办面板切换逻辑 ---
  function openTodo(dateKey) {
    currentTodoDate = dateKey;
    document.getElementById("calendar-main").style.display = "none";
    document.getElementById("todo-panel").style.display = "flex";
    document.getElementById("todoDateTitle").innerText = dateKey;
    renderTodos();
  }

  function closeTodo() {
    document.getElementById("calendar-main").style.display = "block";
    document.getElementById("todo-panel").style.display = "none";
    renderCalendar();
  }

  // --- 任务操作逻辑 (分类渲染) ---
  function renderTodos() {
    const list = document.getElementById("todoList");
    const todos = JSON.parse(
      localStorage.getItem(`todo-${currentTodoDate}`) || "[]",
    );
    const pending = todos
      .filter((t) => !t.done)
      .sort((a, b) => a.time.localeCompare(b.time));
    const completed = todos
      .filter((t) => t.done)
      .sort((a, b) => a.time.localeCompare(b.time));

    let html = "";
    if (pending.length > 0) {
      html += `<div style="font-size:0.65rem; color:#73d0fc; margin:5px 0;">待完成</div>`;
      html += pending
        .map(
          (item, index) => `
            <li class="todo-item">
                <input type="checkbox" onclick="toggleTodo(${index}, false)" style="cursor:pointer;">
                <span class="todo-item-time">${item.time}</span>
                <span class="todo-item-text">${item.text}</span>
                <span class="todo-item-del" onclick="deleteTodoByText('${item.text}', '${item.time}')">×</span>
            </li>`,
        )
        .join("");
    }
    if (completed.length > 0) {
      html += `<div style="font-size:0.65rem; color:#999; margin:10px 0 5px;">已完成</div>`;
      html += completed
        .map(
          (item, index) => `
            <li class="todo-item" style="opacity: 0.6;">
                <input type="checkbox" checked onclick="toggleTodo(${index}, true)" style="cursor:pointer;">
                <span class="todo-item-time" style="text-decoration: line-through;">${item.time}</span>
                <span class="todo-item-text" style="text-decoration: line-through;">${item.text}</span>
                <span class="todo-item-del" onclick="deleteTodoByText('${item.text}', '${item.time}')">×</span>
            </li>`,
        )
        .join("");
    }
    list.innerHTML =
      html ||
      '<p style="text-align:center; color:#999; font-size:0.7rem; margin-top:20px;">暂无任务</p>';
  }

  function toggleTodo(index, isDoneList) {
    const todos = JSON.parse(
      localStorage.getItem(`todo-${currentTodoDate}`) || "[]",
    );
    let pending = todos.filter((t) => !t.done);
    let completed = todos.filter((t) => t.done);
    if (isDoneList) completed[index].done = false;
    else pending[index].done = true;
    localStorage.setItem(
      `todo-${currentTodoDate}`,
      JSON.stringify([...pending, ...completed]),
    );
    renderTodos();
  }

  function addTodo() {
    const input = document.getElementById("todoInput");
    const time = document.getElementById("todoTime");
    if (!input.value.trim()) return;
    const todos = JSON.parse(
      localStorage.getItem(`todo-${currentTodoDate}`) || "[]",
    );
    todos.push({
      text: input.value.trim(),
      time: time.value || "12:00",
      done: false,
    });
    localStorage.setItem(`todo-${currentTodoDate}`, JSON.stringify(todos));
    input.value = "";
    renderTodos();
  }

  function deleteTodoByText(text, time) {
    let todos = JSON.parse(
      localStorage.getItem(`todo-${currentTodoDate}`) || "[]",
    );
    todos = todos.filter((t) => !(t.text === text && t.time === time));
    localStorage.setItem(`todo-${currentTodoDate}`, JSON.stringify(todos));
    renderTodos();
  }

  function changeMonth(step) {
    viewDate.setMonth(viewDate.getMonth() + step);
    renderCalendar();
  }

  document.addEventListener("DOMContentLoaded", renderCalendar);

  // 1. 解析 LRC 歌词的引擎
  function parseLyrics(text) {
    const lines = text.split("\n");
    const res = [];
    const reg = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;
    lines.forEach((l) => {
      const m = l.match(reg);
      if (m) {
        const t =
          parseInt(m[1]) * 60 +
          parseInt(m[2]) +
          parseInt(m[3]) / (m[3].length === 3 ? 1000 : 100);
        const txt = l.replace(reg, "").trim();
        if (txt) res.push({ time: t, text: txt });
      }
    });
    return res;
  }

    if (timeDiff < 0) {
      runtimeEl.innerHTML = "即将开启...";
      return;
    }

    const days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
    const hours = Math.floor(
      (timeDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
    );
    const minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((timeDiff % (1000 * 60)) / 1000);

    runtimeEl.innerHTML =
      days +
      "天" +
      (hours < 10 ? "0" + hours : hours) +
      "時" +
      (minutes < 10 ? "0" + minutes : minutes) +
      "分 " +
      (seconds < 10 ? "0" + seconds : seconds) +
      "秒";
