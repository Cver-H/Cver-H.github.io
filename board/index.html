<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>PHOTO</title>
    <link rel="stylesheet" href="board-style.css">
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<div id="loader" class="preloader_container">
    <div class="door-left"></div>
    <div class="door-right"></div>
    
    <div class="preloader_gspContainer">
        <div class="word_unit">
            <span class="letter_main">H</span>
            <span class="expand_text">
                <span class="letter_child">c</span>
                <span class="letter_child">v</span>
                <span class="letter_child">e</span>
                <span class="letter_child">r</span>
            </span>
        </div>
        
        <div class="word_spacer"></div>

        <div class="word_unit">
            <span class="letter_main">C</span>
            <span class="expand_text">
                <span class="letter_child">h</span>
                <span class="letter_child">e</span>
                <span class="letter_child">n</span>
            </span>
        </div>
    </div>
</div>

<div class="film-wrapper">
    <div class="film-strip">
        
        <div class="film-card" onclick="this.classList.toggle('flipped')">
            <div class="card-inner">
                <div class="card-front">
                    <div class="film-time">2026 / 03 / 14</div>
                    <div class="img-content">
                        <img src="/images/board/本杰明谢幕.jpg"> </div>
                </div>
                <div class="card-back">
                    <p class="handwritten-text">这是横版照片的留言。<br>胶片框会自动变宽。 </p>
                </div>
            </div>
        </div>

        <div class="film-card" onclick="this.classList.toggle('flipped')">
            <div class="card-inner">
                <div class="card-front">
                    <div class="film-time">2026 / 03 / 15</div>
                    <div class="img-content">
                        <img src="/images/board/maxi.jpg"> </div>
                </div>
                <div class="card-back">
                    <p class="handwritten-text">这是竖版照片的留言。<br>胶片框会自动变窄贴合图片。</p>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="/js/music.js"></script>

<script>
window.addEventListener('load', () => {
    const tl = gsap.timeline();

    // 1. 初始化：让 H 和 C 靠得极近
    gsap.set("#unitL", { x: 30 });
    gsap.set("#unitR", { x: -30 });

    // 2. H 和 C 淡淡浮现
    tl.to(".letter_main", {
        opacity: 1,
        duration: 1.5,
        stagger: 0.4,
        ease: "power2.inOut"
    })

    // 3. 核心位移：左右游开 + 字母像墨水一样流出来
    // 这里用 expo.inOut 曲线，模拟视频里那种高级的呼吸感
    .to(["#unitL", "#unitR"], {
        x: (i) => i === 0 ? -25 : 25, // 往两边拉开的距离
        duration: 2.2,
        ease: "expo.inOut"
    }, "+=0.2")

    .to(".expand_text", {
        width: "auto",
        opacity: 1,
        duration: 2.2,
        ease: "expo.inOut"
    }, "<") // 与位移同步

    .to(".letter_child", {
        x: 0,
        stagger: 0.08, // 每个字母错开一点点，形成流动感
        duration: 1.5,
        ease: "power2.out"
    }, "<0.2") // 在位移开始后0.2秒启动字母拉伸

    // 4. 整体渐隐并开门
    .to(".preloader_gspContainer", {
        opacity: 0,
        filter: "blur(15px)",
        scale: 1.1,
        duration: 1.2,
        ease: "power2.inOut"
    }, "+=1")

    .to(".door-left", { xPercent: -100, duration: 1.6, ease: "expo.inOut" }, "-=0.6")
    .to(".door-right", { xPercent: 100, duration: 1.6, ease: "expo.inOut" }, "<")

    .set("#loader", { display: "none" });
});
</script>
</body>
</html>
